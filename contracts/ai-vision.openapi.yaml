openapi: "3.1.0"

info:
  title: Camera ↔ AI Vision API
  version: "1.0.0"
  description: |
    Hợp đồng API giữa Camera Service (Consumer) và AI Vision Service (Provider)
    trong hệ thống Smart Campus FIT4110 — Lab 02.
  contact:
    name: FIT4110 Lab 02 — Pair 01
  license:
    name: MIT

servers:
  - url: http://localhost:4010
    description: Prism mock server (local)
  - url: https://api.smartcampus.internal/ai-vision/v1
    description: Production (internal)

tags:
  - name: frames
    description: Gửi frame ảnh từ camera lên AI Vision để phân tích
  - name: alerts
    description: Truy vấn cảnh báo được sinh ra từ kết quả phân tích
  - name: models
    description: Quản lý model AI đang được triển khai
  - name: health
    description: Kiểm tra trạng thái service

paths:

  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Kiểm tra trạng thái AI Vision Service
      description: API này dùng để health-check, đảm bảo AI Vision đang hoạt động ổn định và sẵn sàng nhận yêu cầu phân tích frame.
      responses:
        "200":
          description: Service đang hoạt động bình thường
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                version: "1.0.0"
                uptime_seconds: 3600
        "503":
          description: Service không khả dụng
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /frames:
    post:
      operationId: submitFrame
      tags: [frames]
      summary: Gửi một frame ảnh từ camera để phân tích
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FrameSubmitRequest"
            examples:
              intruder_detection:
                summary: Frame phát hiện xâm nhập
                value:
                  camera_id: "cam-001"
                  timestamp: "2025-06-01T08:00:00Z"
                  image_base64: "dGVzdA=="
                  resolution:
                    width: 1920
                    height: 1080
                  scene_hint: intruder_detection
              crowd_monitoring:
                summary: Frame giám sát đám đông
                value:
                  camera_id: "cam-042"
                  timestamp: "2025-06-01T09:15:00Z"
                  image_base64: "dGVzdA=="
                  resolution:
                    width: 1280
                    height: 720
                  scene_hint: crowd_monitoring
      responses:
        "202":
          description: Frame đã được nhận, đang xử lý bất đồng bộ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrameAccepted"
        "400":
          description: Dữ liệu frame không hợp lệ
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: "https://smartcampus.internal/errors/invalid-frame"
                title: "Invalid Frame"
                status: 400
                detail: "Trường image_base64 không được để trống"
                instance: "urn:uuid:12345678-1234-1234-1234-1234567890ab"
        "401":
          description: Chưa xác thực
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "422":
          description: Frame đúng cú pháp nhưng không thể xử lý
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Lỗi nội bộ server
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /frames/{frame_id}/result:
    get:
      operationId: getFrameResult
      tags: [frames]
      summary: Lấy kết quả phân tích của một frame
      security:
        - BearerAuth: []
      parameters:
        - name: frame_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID của frame đã gửi
      responses:
        "200":
          description: Kết quả phân tích frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrameAnalysisResult"
        "202":
          description: Frame đang được xử lý, chưa có kết quả
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrameAccepted"
        "404":
          description: Không tìm thấy frame
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Chưa xác thực
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /alerts/recent:
    get:
      operationId: listRecentAlerts
      tags: [alerts]
      summary: Lấy danh sách cảnh báo gần đây từ AI Vision
      security:
        - BearerAuth: []
      parameters:
        - name: camera_id
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Lọc theo camera cụ thể (null = tất cả camera)
        - name: severity
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AlertSeverity"
          description: Lọc theo mức độ nghiêm trọng
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: since
          in: query
          required: false
          schema:
            type: ["string", "null"]
            format: date-time
          description: Chỉ lấy cảnh báo từ thời điểm này trở đi
      responses:
        "200":
          description: Danh sách cảnh báo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertListResponse"
        "400":
          description: Tham số truy vấn không hợp lệ
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Chưa xác thực
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /models/active:
    get:
      operationId: getActiveModel
      tags: [models]
      summary: Lấy thông tin model AI đang được kích hoạt
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Thông tin model hiện tại
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelInfo"
        "401":
          description: Chưa xác thực
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Không có model nào đang hoạt động
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable]
        version:
          type: string
        uptime_seconds:
          type: ["integer", "null"]

    FrameSubmitRequest:
      type: object
      required: [camera_id, timestamp, image_base64]
      properties:
        camera_id:
          type: string
          description: ID định danh camera gửi frame
          example: "cam-001"
        timestamp:
          type: string
          format: date-time
          description: Thời điểm chụp frame (ISO 8601 UTC)
        image_base64:
          type: string
          format: byte
          description: Nội dung ảnh được encode base64
        resolution:
          $ref: "#/components/schemas/Resolution"
        scene_hint:
          type: ["string", "null"]
          description: Gợi ý ngữ cảnh để chọn pipeline phân tích phù hợp
          enum: [intruder_detection, crowd_monitoring, fire_smoke, general]

    Resolution:
      type: object
      required: [width, height]
      properties:
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1

    FrameAccepted:
      type: object
      required: [frame_id, status]
      properties:
        frame_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing]
        estimated_ms:
          type: ["integer", "null"]
          description: Thời gian xử lý ước tính (ms), null nếu không xác định

    FrameAnalysisResult:
      type: object
      required: [frame_id, camera_id, analyzed_at, detections]
      properties:
        frame_id:
          type: string
          format: uuid
        camera_id:
          type: string
        analyzed_at:
          type: string
          format: date-time
        model_version:
          type: ["string", "null"]
        detections:
          type: array
          items:
            $ref: "#/components/schemas/Detection"
        alert:
          oneOf:
            - $ref: "#/components/schemas/AlertGenerated"
            - $ref: "#/components/schemas/NoAlert"
          discriminator:
            propertyName: alert_type
            mapping:
              generated: "#/components/schemas/AlertGenerated"
              none: "#/components/schemas/NoAlert"

    Detection:
      type: object
      required: [label, confidence]
      properties:
        label:
          type: string
          description: Nhãn đối tượng được phát hiện
        confidence:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
        bounding_box:
          $ref: "#/components/schemas/BoundingBox"

    BoundingBox:
      type: object
      required: [x, y, width, height]
      properties:
        x:
          type: integer
        y:
          type: integer
        width:
          type: integer
        height:
          type: integer

    AlertGenerated:
      type: object
      required: [alert_type, alert_id, severity, message]
      properties:
        alert_type:
          type: string
          const: generated
        alert_id:
          type: string
          format: uuid
        severity:
          $ref: "#/components/schemas/AlertSeverity"
        message:
          type: string
        triggered_at:
          type: string
          format: date-time

    NoAlert:
      type: object
      required: [alert_type]
      properties:
        alert_type:
          type: string
          const: none
        reason:
          type: ["string", "null"]
          description: Lý do không sinh cảnh báo, có thể null

    AlertSeverity:
      type: string
      enum: [low, medium, high, critical]
      description: Mức độ nghiêm trọng của cảnh báo

    AlertListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AlertSummary"
        total:
          type: integer
        next_cursor:
          type: ["string", "null"]

    AlertSummary:
      type: object
      required: [alert_id, camera_id, severity, triggered_at]
      properties:
        alert_id:
          type: string
          format: uuid
        camera_id:
          type: string
        severity:
          $ref: "#/components/schemas/AlertSeverity"
        message:
          type: ["string", "null"]
        triggered_at:
          type: string
          format: date-time

    ModelInfo:
      type: object
      required: [model_id, name, version, status]
      properties:
        model_id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [active, loading, error]
        loaded_at:
          type: ["string", "null"]
          format: date-time
        capabilities:
          type: array
          items:
            type: string
          example: [intruder_detection, crowd_monitoring, fire_smoke]

    ProblemDetails:
      type: object
      required: [title, status]
      description: RFC 7807 Problem Details
      properties:
        type:
          type: ["string", "null"]
          format: uri
          description: URI tham chiếu loại lỗi
        title:
          type: string
          description: Mô tả ngắn gọn loại lỗi
        status:
          type: integer
          description: HTTP status code
        detail:
          type: ["string", "null"]
          description: Mô tả chi tiết lỗi cụ thể
        instance:
          type: ["string", "null"]
          format: uri
          description: URI của request gây ra lỗi